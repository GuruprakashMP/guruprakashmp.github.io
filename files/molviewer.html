<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MolVis — Unified Structure Viewer</title>
<script src="https://3dmol.org/build/3Dmol-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg1:#0c1018;--bg2:#111822;--bg3:#172030;
  --border:#1c2a3e;--border2:#243550;
  --text:#b8cce0;--text2:#5a7a9a;--text3:#2e4a64;
  --accent:#3af0c8;--accent2:#00b896;
  --gold:#f5c842;--gold2:#c89e00;
  --red:#ff4a6b;--blue:#4a9eff;
  --mono:'IBM Plex Mono',monospace;
  --ui:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--ui);color:var(--text);display:flex;flex-direction:column}

/* ══ TOP PANEL ══ */
#top{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:10px 12px 0;flex-shrink:0;
}

/* paste side */
.panel-box{
  background:var(--bg1);border:1px solid var(--border);border-radius:10px;
  padding:10px;display:flex;flex-direction:column;gap:6px;
  min-height:0;
}
.panel-label{
  font-family:var(--mono);font-size:0.58rem;font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);
  display:flex;align-items:center;gap:6px;
}
.panel-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.panel-label.gold::before{background:var(--gold)}

textarea#paste-box{
  flex:1;resize:none;background:var(--bg2);
  border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--mono);font-size:0.7rem;
  padding:8px;outline:none;line-height:1.6;min-height:88px;max-height:140px;
  transition:border-color 0.15s;
}
textarea#paste-box:focus{border-color:var(--accent)}
textarea#paste-box::placeholder{color:var(--text3)}

/* upload side */
#upload-zone{
  flex:1;border:1.5px dashed var(--border2);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;padding:10px;text-align:center;
  background:var(--bg2);position:relative;overflow:hidden;min-height:88px;
}
#upload-zone::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,rgba(58,240,200,0.03) 0%,transparent 70%);
  pointer-events:none;
}
#upload-zone:hover,#upload-zone.over{
  border-color:var(--accent);background:rgba(58,240,200,0.03);
}
#upload-zone.gold-over{border-color:var(--gold);background:rgba(245,200,66,0.03);}
.uz-icon{font-size:1.6rem;margin-bottom:3px;line-height:1}
.uz-text{font-family:var(--mono);font-size:0.68rem;color:var(--text2)}
.uz-text strong{color:var(--accent);cursor:pointer}
.uz-formats{
  display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:5px;
}
.uz-tag{
  font-family:var(--mono);font-size:0.56rem;padding:1px 6px;border-radius:3px;
  border:1px solid var(--border2);color:var(--text3);
}
.uz-tag.hi{border-color:rgba(58,240,200,0.25);color:var(--accent2)}
.uz-tag.gold{border-color:rgba(245,200,66,0.25);color:var(--gold2)}

/* active file badge inside upload zone */
#file-badge{
  display:none;flex-direction:column;align-items:center;gap:4px;
  width:100%;
}
.fb-name{
  font-family:var(--mono);font-size:0.7rem;color:var(--accent);
  font-weight:600;text-align:center;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.fb-meta{font-family:var(--mono);font-size:0.6rem;color:var(--text2)}
.fb-clear{
  font-family:var(--mono);font-size:0.58rem;color:var(--text3);
  cursor:pointer;transition:color 0.15s;padding:2px 8px;
  border:1px solid var(--border2);border-radius:4px;margin-top:2px;
}
.fb-clear:hover{color:var(--red);border-color:var(--red)}
.fb-progress{
  width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;
}
.fb-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;transition:width 0.1s}
.fb-prog-msg{font-family:var(--mono);font-size:0.58rem;color:var(--gold);margin-top:2px}

input[type=file]{display:none}

/* ══ TOOLBAR ══ */
#toolbar{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  background:var(--bg1);border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
  margin-top:10px;
}
.tb-sep{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 2px}
.tb-label{font-family:var(--mono);font-size:0.56rem;color:var(--text3);letter-spacing:0.1em;white-space:nowrap}
select.tb-sel{
  background:var(--bg2);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-family:var(--mono);font-size:0.67rem;
  padding:4px 7px;outline:none;cursor:pointer;
}
select.tb-sel:focus{border-color:var(--accent)}
.tbtog{
  padding:4px 10px;border-radius:5px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-family:var(--mono);
  font-size:0.65rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.tbtog:hover{border-color:var(--accent);color:var(--accent)}
.tbtog.on{border-color:var(--accent);color:var(--accent);background:rgba(58,240,200,0.08)}
.tbbtn{
  padding:4px 10px;border-radius:5px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-family:var(--mono);
  font-size:0.65rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.tbbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbbtn.red:hover{border-color:var(--red);color:var(--red)}
/* status pill in toolbar */
#tb-status{
  font-family:var(--mono);font-size:0.62rem;padding:3px 10px;
  border-radius:4px;display:none;max-width:260px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
#tb-status.ok{display:block;background:rgba(58,240,200,0.08);border:1px solid var(--accent2);color:var(--accent)}
#tb-status.err{display:block;background:rgba(255,74,107,0.08);border:1px solid var(--red);color:var(--red)}
#tb-status.inf{display:block;background:rgba(74,158,255,0.08);border:1px solid var(--blue);color:var(--blue)}
/* spacer */
.tb-spacer{flex:1}

/* ══ VIEWER WRAP ══ */
#viewer-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
#viewer{width:100%;height:100%;background:#010409}
/* placeholder */
#ph{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;gap:10px;
}
.ph-mol{font-size:5rem;opacity:0.07;animation:bob 5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.ph-text{font-family:var(--mono);font-size:0.75rem;color:var(--border2)}
.ph-sub{font-family:var(--mono);font-size:0.58rem;color:var(--text3);margin-top:-4px}

/* ══ VIEWER OVERLAY — structure info (bottom-left) ══ */
#overlay{
  position:absolute;bottom:14px;left:14px;z-index:50;
  background:rgba(7,9,15,0.82);backdrop-filter:blur(8px);
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 12px;display:none;max-width:340px;
}
.ov-name{
  font-family:var(--mono);font-size:0.72rem;font-weight:600;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:300px;
}
.ov-meta{
  font-family:var(--mono);font-size:0.62rem;color:var(--text2);margin-top:3px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.ov-meta span{color:var(--accent)}
.ov-energy{color:var(--gold) !important}

/* ══ VIEWER OVERLAY — nav (right side) ══ */
#nav-panel{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  z-index:50;display:none;flex-direction:column;gap:6px;
}
.nav-btn{
  width:36px;height:36px;border-radius:8px;
  border:1px solid rgba(58,240,200,0.2);
  background:rgba(7,9,15,0.82);backdrop-filter:blur(6px);
  color:var(--accent);font-size:1rem;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover:not(:disabled){background:rgba(58,240,200,0.15);border-color:var(--accent)}
.nav-btn:disabled{opacity:0.15;cursor:not-allowed}

/* ══ VIEWER OVERLAY — counter (top-center) ══ */
#counter-bar{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:50;display:none;
  background:rgba(7,9,15,0.82);backdrop-filter:blur(8px);
  border:1px solid var(--border2);border-radius:20px;
  padding:5px 16px;
  font-family:var(--mono);font-size:0.72rem;color:var(--text2);
  display:none;align-items:center;gap:10px;white-space:nowrap;
}
#counter-bar span.cur{color:var(--accent);font-weight:700;font-size:0.85rem}
#counter-bar span.tot{color:var(--text)}
.jump-mini{
  display:flex;gap:4px;align-items:center;margin-left:4px;
}
input#jump-inp{
  width:44px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:4px;color:var(--text);font-family:var(--mono);
  font-size:0.68rem;padding:2px 4px;outline:none;text-align:center;
}
input#jump-inp:focus{border-color:var(--accent)}
button#jump-go{
  padding:2px 8px;border-radius:4px;border:none;
  background:var(--accent);color:#07090f;font-family:var(--mono);
  font-size:0.62rem;font-weight:700;cursor:pointer;
}

/* ══ PROGRESS BAR (bottom of viewer) ══ */
#prog-wrap{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  display:none;z-index:40;
}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 0.12s}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
select option{background:var(--bg2)}
</style>
</head>
<body>

<!-- ══ TOP PANEL ══ -->
<div id="top">
  <!-- LEFT: Paste -->
  <div class="panel-box">
    <div class="panel-label">Paste Coordinates</div>
    <textarea id="paste-box"
      placeholder="Paste anything — XYZ (single or multi), PDB, MOL, SDF, MOL2, Gaussian LOG, SMILES, or even raw SI coordinate text.&#10;Auto-detects format and visualises instantly."></textarea>
  </div>
  <!-- RIGHT: Upload -->
  <div class="panel-box">
    <div class="panel-label gold">Upload File</div>
    <div id="upload-zone">
      <div id="uz-default">
        <div class="uz-icon">⬆</div>
        <div class="uz-text">Drop any file or <strong id="uz-click">click to browse</strong></div>
        <div class="uz-formats">
          <span class="uz-tag hi">.xyz</span>
          <span class="uz-tag hi">.pdb</span>
          <span class="uz-tag hi">.sdf</span>
          <span class="uz-tag hi">.mol</span>
          <span class="uz-tag hi">.mol2</span>
          <span class="uz-tag hi">.log</span>
          <span class="uz-tag hi">.gjf</span>
          <span class="uz-tag gold">.pdf</span>
          <span class="uz-tag gold">.docx</span>
          <span class="uz-tag">.txt</span>
        </div>
      </div>
      <div id="file-badge">
        <div class="fb-name" id="fb-name">—</div>
        <div class="fb-meta" id="fb-meta">—</div>
        <div class="fb-progress"><div class="fb-prog-fill" id="fb-prog-fill"></div></div>
        <div class="fb-prog-msg" id="fb-prog-msg"></div>
        <div class="fb-clear" onclick="clearUpload()">✕ clear</div>
      </div>
    </div>
    <input type="file" id="file-input" accept=".xyz,.pdb,.mol,.mol2,.sdf,.log,.gjf,.com,.txt,.pdf,.docx">
  </div>
</div>

<!-- ══ TOOLBAR ══ -->
<div id="toolbar">
  <span class="tb-label">STYLE</span>
  <select class="tb-sel" id="sty">
    <option value="bs" selected>Ball &amp; Stick</option>
    <option value="stick">Stick</option>
    <option value="sphere">Space Fill</option>
    <option value="line">Line</option>
    <option value="cross">Cross</option>
  </select>
  <div class="tb-sep"></div>
  <span class="tb-label">COLOUR</span>
  <select class="tb-sel" id="col">
    <option value="Jmol" selected>CPK / Element</option>
    <option value="chain">By Chain</option>
    <option value="residue">By Residue</option>
    <option value="spectrum">Rainbow</option>
  </select>
  <div class="tb-sep"></div>
  <span class="tb-label">SURFACE</span>
  <select class="tb-sel" id="sur">
    <option value="none">None</option>
    <option value="VDW">Van der Waals</option>
    <option value="SAS">Solvent Access.</option>
    <option value="SES">Solvent Excl.</option>
  </select>
  <div class="tb-sep"></div>
  <button class="tbtog" id="btn-lbl" onclick="toggleLabels()">🏷 Labels</button>
  <button class="tbtog" id="btn-spn" onclick="toggleSpin()">🔄 Spin</button>
  <button class="tbtog" id="btn-bg"  onclick="toggleBg()">☀ Light</button>
  <div class="tb-sep"></div>
  <button class="tbbtn" onclick="doSave()">💾 PNG</button>
  <button class="tbbtn red" onclick="doReset()">✕ Reset</button>
  <div class="tb-spacer"></div>
  <div id="tb-status"></div>
</div>

<!-- ══ VIEWER ══ -->
<div id="viewer-wrap">
  <div id="viewer">
    <div id="ph">
      <div class="ph-mol">⚛️</div>
      <div class="ph-text">Paste coordinates or upload a file to begin</div>
      <div class="ph-sub">XYZ · PDB · MOL · SDF · MOL2 · Gaussian LOG · SMILES · SI PDF · DOCX · TXT</div>
    </div>
  </div>

  <!-- Structure info overlay -->
  <div id="overlay">
    <div class="ov-name" id="ov-name">—</div>
    <div class="ov-meta" id="ov-meta"></div>
  </div>

  <!-- Navigation arrows -->
  <div id="nav-panel">
    <button class="nav-btn" id="nav-first" onclick="goTo(0)" title="First">⏮</button>
    <button class="nav-btn" id="nav-prev"  onclick="goTo(curIdx-1)" title="Previous">◀</button>
    <button class="nav-btn" id="nav-next"  onclick="goTo(curIdx+1)" title="Next">▶</button>
    <button class="nav-btn" id="nav-last"  onclick="goTo(totalStr()-1)" title="Last">⏭</button>
  </div>

  <!-- Counter bar -->
  <div id="counter-bar">
    <span class="cur" id="cb-cur">1</span>
    <span style="color:var(--text3)">/</span>
    <span class="tot" id="cb-tot">?</span>
    <div class="jump-mini">
      <input type="number" id="jump-inp" min="1" value="1" onkeydown="if(event.key==='Enter')doJump()">
      <button id="jump-go" onclick="doJump()">▶</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="prog-wrap"><div id="prog-fill"></div></div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
var gv = null, gLabels = false, gSpin = false, gBg = false;
var curIdx = 0;
var mode = '';          // 'lazy' | 'multi'
var lazyLines = [];     // raw lines for lazy XYZ
var lazyOffsets = [];   // [{lineStart,n,comment}]
var multiMols = [];     // [{name,xyzString,energy,natoms}]
var pasteDebounce = null;

function totalStr(){ return mode==='lazy'?lazyOffsets.length:mode==='multi'?multiMols.length:0; }

// ═══════════════════════════════════════════════════════════════
// ELEMENT TABLES
// ═══════════════════════════════════════════════════════════════
var ANUM={},_SYM=['','H','He','Li','Be','B','C','N','O','F','Ne',
  'Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca','Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn',
  'Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr','Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn',
  'Sb','Te','I','Xe','Cs','Ba','La','Ce','Pr','Nd','Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb',
  'Lu','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg','Tl','Pb','Bi','Po','At','Rn','Fr','Ra','Ac','Th','Pa','U','Np','Pu'];
for(var _i=1;_i<_SYM.length;_i++) ANUM[_i]=_SYM[_i];
var ELEMS={};
for(var _i=1;_i<_SYM.length;_i++) ELEMS[_SYM[_i].toLowerCase()]=_SYM[_i];

// ═══════════════════════════════════════════════════════════════
// UNICODE / NORMALISE
// ═══════════════════════════════════════════════════════════════
function norm(s){
  if(!s) return '';
  return s.replace(/[\u2010-\u2015\u2212\uff0d]/g,'-').replace(/[\u00a0\u202f\u2009]/g,' ');
}

// ═══════════════════════════════════════════════════════════════
// COORDINATE LINE PARSER  (7 formats)
// ═══════════════════════════════════════════════════════════════
function parseCoordLine(raw){
  var line=norm(raw), t=line.trim().split(/\s+/);
  if(t.length<4) return null;
  function flt(s){ var v=parseFloat(s); return isNaN(v)?null:v; }
  function dot(s){ return s.indexOf('.')!==-1; }
  function isAN(s){ var n=parseInt(s,10); return !isNaN(n)&&n>=1&&n<=118&&!!ANUM[n]; }
  function isEl(s){ return !!(s&&ELEMS[s.toLowerCase()]); }
  var x,y,z;
  // Format 1: AtomNum x y z
  if(isAN(t[0])&&dot(t[1])&&dot(t[2])&&dot(t[3])){ x=flt(t[1]);y=flt(t[2]);z=flt(t[3]); if(x!==null&&y!==null&&z!==null) return [ANUM[parseInt(t[0],10)],x,y,z]; }
  // Format 2: Elem x y z
  if(isEl(t[0])&&dot(t[1])&&dot(t[2])&&dot(t[3])){ x=flt(t[1]);y=flt(t[2]);z=flt(t[3]); if(x!==null&&y!==null&&z!==null) return [ELEMS[t[0].toLowerCase()],x,y,z]; }
  if(t.length>=5){
    // Format 3: Idx Elem x y z
    if(isEl(t[1])&&dot(t[2])&&dot(t[3])&&dot(t[4])){ x=flt(t[2]);y=flt(t[3]);z=flt(t[4]); if(x!==null&&y!==null&&z!==null) return [ELEMS[t[1].toLowerCase()],x,y,z]; }
    // Format 4: Idx AtomNum x y z
    if(isAN(t[1])&&dot(t[2])&&dot(t[3])&&dot(t[4])){ x=flt(t[2]);y=flt(t[3]);z=flt(t[4]); if(x!==null&&y!==null&&z!==null) return [ANUM[parseInt(t[1],10)],x,y,z]; }
    // Format 5: Elem AtomNum x y z
    if(isEl(t[0])&&isAN(t[1])&&dot(t[2])&&dot(t[3])&&dot(t[4])){ x=flt(t[2]);y=flt(t[3]);z=flt(t[4]); if(x!==null&&y!==null&&z!==null) return [ELEMS[t[0].toLowerCase()],x,y,z]; }
  }
  if(t.length>=6){
    // Format 6: Gaussian orient table: idx atomnum atomtype x y z
    if(isAN(t[1])&&dot(t[3])&&dot(t[4])&&dot(t[5])){ x=flt(t[3]);y=flt(t[4]);z=flt(t[5]); if(x!==null&&y!==null&&z!==null) return [ANUM[parseInt(t[1],10)],x,y,z]; }
    // Format 7: Elem x y z charge/spin ... (extra cols ignored)
    if(isEl(t[0])&&dot(t[1])&&dot(t[2])&&dot(t[3])){ x=flt(t[1]);y=flt(t[2]);z=flt(t[3]); if(x!==null&&y!==null&&z!==null) return [ELEMS[t[0].toLowerCase()],x,y,z]; }
  }
  return null;
}

function molToXYZ(mol){
  var comment=mol.name+(mol.energy?'  E='+mol.energy:'');
  var out=[mol.atoms.length+'',comment];
  mol.atoms.forEach(function(a){ out.push(a[0]+'  '+a[1].toFixed(8)+'  '+a[2].toFixed(8)+'  '+a[3].toFixed(8)); });
  return out.join('\n');
}

// ═══════════════════════════════════════════════════════════════
// FORMAT SNIFFER
// ═══════════════════════════════════════════════════════════════
function sniffFormat(text){
  var t=text.trim();
  if(!t) return null;
  if(/^(ATOM  |HETATM|REMARK|HEADER)/m.test(t)) return 'pdb';
  if(/@<TRIPOS>MOLECULE/.test(t)) return 'mol2';
  if(/\$\$\$\$/.test(t)) return 'sdf';
  if(/(V2000|V3000|M  END)/.test(t)) return 'mol';
  if(/Standard orientation:|Input orientation:/.test(t)) return 'gaussian';
  // XYZ: first non-blank line is a pure integer
  var lines=t.split(/\r?\n/);
  for(var i=0;i<Math.min(5,lines.length);i++){
    var l=lines[i].trim();
    if(!l) continue;
    if(/^\d+$/.test(l)) return 'xyz';
    break;
  }
  // bare XYZ / SI text — check if coord lines appear
  var coordCount=0;
  for(var i=0;i<Math.min(40,lines.length);i++){
    if(parseCoordLine(norm(lines[i]))) coordCount++;
  }
  if(coordCount>=3) return 'si-text';
  // single-word or short string → SMILES
  if(!/\s/.test(t.split('\n')[0].trim())&&t.split('\n')[0].length<200) return 'smiles';
  return 'unknown';
}

// ═══════════════════════════════════════════════════════════════
// GAUSSIAN LOG EXTRACTOR
// ═══════════════════════════════════════════════════════════════
function gaussianToXYZ(text){
  var ls=text.split(/\r?\n/), last=[];
  for(var i=0;i<ls.length;i++){
    if(ls[i].indexOf('Standard orientation:')!==-1||ls[i].indexOf('Input orientation:')!==-1){
      i+=5; var cur=[];
      while(i<ls.length&&ls[i].indexOf('---')===-1){
        var p=ls[i].trim().split(/\s+/);
        if(p.length>=6){ var el=ANUM[parseInt(p[1])]; if(el) cur.push(el+' '+parseFloat(p[3]).toFixed(6)+' '+parseFloat(p[4]).toFixed(6)+' '+parseFloat(p[5]).toFixed(6)); }
        i++;
      }
      if(cur.length) last=cur;
    }
  }
  return last.length?last.length+'\nGaussian\n'+last.join('\n'):null;
}

// ═══════════════════════════════════════════════════════════════
// LAZY MULTI-XYZ
// ═══════════════════════════════════════════════════════════════
function looksXYZCoord(line){
  if(!line||!line.trim()) return false;
  var p=line.trim().split(/\s+/);
  if(p.length>=4){ var x=parseFloat(p[1]),y=parseFloat(p[2]),z=parseFloat(p[3]); if(!isNaN(x)&&!isNaN(y)&&!isNaN(z)) return true; }
  return false;
}
function buildLazyIndex(rawLines,onDone){
  var result=[],i=0,total=rawLines.length,CHUNK=8000;
  function tick(){
    var end=Math.min(i+CHUNK,total);
    while(i<end){
      var t=rawLines[i].trim();
      if(/^\d+$/.test(t)){
        var n=parseInt(t,10);
        if(n>0&&(i+n+2)<=total&&looksXYZCoord(rawLines[i+2])){ result.push({lineStart:i,n:n,comment:rawLines[i+1]?rawLines[i+1].trim():''}); i+=n+2; continue; }
      }
      i++;
    }
    if(i<total) setTimeout(tick,0);
    else onDone(result);
  }
  setTimeout(tick,0);
}
function extractLazy(idx){
  var o=lazyOffsets[idx];
  var comment=o.comment||('Structure '+(idx+1));
  return o.n+'\n'+comment+'\n'+lazyLines.slice(o.lineStart+2,o.lineStart+2+o.n).join('\n');
}
function showLazy(idx){
  if(!lazyOffsets.length) return;
  idx=Math.max(0,Math.min(idx,lazyOffsets.length-1));
  curIdx=idx;
  makeViewer();
  gv.addModel(extractLazy(idx),'xyz');
  applyStyle(); gv.zoomTo(); gv.render();
  var atoms=gv.getModel().selectedAtoms({}).length;
  var comment=lazyOffsets[idx].comment||('Structure '+(idx+1));
  showOverlay(comment,atoms,'XYZ',null,idx+1,lazyOffsets.length);
}

function processMultiXYZ(text){
  setStatus('Indexing structures…','inf');
  setTimeout(function(){
    lazyLines=text.split(/\r?\n/);
    buildLazyIndex(lazyLines,function(result){
      if(!result.length){ processSingleText(text); return; }
      lazyOffsets=result; mode='lazy'; multiMols=[];
      showLazy(0);
      setStatus('✓ '+result.length+' structures loaded','ok');
    });
  },20);
}

// ═══════════════════════════════════════════════════════════════
// SINGLE TEXT PROCESSOR  (paste or text file)
// ═══════════════════════════════════════════════════════════════
function processSingleText(text){
  var fmt=sniffFormat(text);
  if(!fmt||fmt==='unknown'){ setStatus('Could not detect format','err'); return; }
  if(fmt==='xyz'){ processMultiXYZ(text); return; }
  if(fmt==='smiles'){
    setStatus('Fetching 3D structure from NIH CACTUS…','inf');
    fetch('https://cactus.nci.nih.gov/chemical/structure/'+encodeURIComponent(text.trim())+'/file?format=sdf&get3d=true')
      .then(function(r){return r.text();})
      .then(function(sdf){
        if(sdf.toLowerCase().indexOf('not found')>-1||sdf.length<20){ setStatus('SMILES could not be resolved to 3D structure','err'); return; }
        renderSingle(sdf,'sdf',text.trim().substring(0,30),null);
      }).catch(function(){setStatus('Network error fetching SMILES','err');});
    return;
  }
  if(fmt==='gaussian'){
    var xyz=gaussianToXYZ(text);
    if(xyz) renderSingle(xyz,'xyz','Gaussian LOG',null);
    else setStatus('Could not extract coordinates from Gaussian LOG','err');
    return;
  }
  if(fmt==='si-text'){
    var ls=text.split(/\r?\n/);
    ls=repairBrokenCoordLines(ls);
    ls=joinSplitEnergies(ls);
    var mols=parseSI(ls,0,1,3,false);
    if(mols.length){
      multiMols=mols.map(function(m){ return{name:m.name,xyzString:molToXYZ(m),energy:m.energy,natoms:m.atoms.length}; });
      mode='multi'; lazyOffsets=[];
      showMulti(0);
      setStatus('✓ Found '+mols.length+' structures in pasted text','ok');
    } else {
      setStatus('No recognisable coordinate blocks found','err');
    }
    return;
  }
  renderSingle(text,fmt,fmt.toUpperCase()+' structure',null);
}

function clearUpload(){
  document.getElementById('file-badge').style.display='none';
  document.getElementById('uz-default').style.display='block';
  document.getElementById('file-input').value='';
  setUploadProgress('',0);
}

function handleFile(file){
  if(!file) return;
  var ext=file.name.split('.').pop().toLowerCase();
  // Show badge
  document.getElementById('uz-default').style.display='none';
  document.getElementById('file-badge').style.display='flex';
  document.getElementById('fb-name').textContent=file.name;
  document.getElementById('fb-meta').textContent=Math.round(file.size/1024)+' KB · .'+ext;
  setUploadProgress('Reading…',5);

  if(ext==='pdf'){
    processPDF(file); return;
  }
  if(ext==='docx'){
    processDOCX(file); return;
  }
  // All text-based formats
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result;
    setUploadProgress('Analysing…',60);
    setTimeout(function(){
      dispatchTextFile(text,ext,file.name);
      setUploadProgress('Done',100);
    },30);
  };
  reader.onerror=function(){ setStatus('Could not read file','err'); setUploadProgress('Error',0); };
  reader.readAsText(file);
}

function dispatchTextFile(text,ext,filename){
  // Extension-priority dispatch, then content sniff
  if(ext==='log'||ext==='gjf'||ext==='com'){
    var xyz=gaussianToXYZ(text);
    if(xyz){ renderSingle(xyz,'xyz',filename,null); return; }
    // fallback: try as XYZ
  }
  if(ext==='pdb'){ renderSingle(text,'pdb',filename,null); return; }
  if(ext==='mol2'){ renderSingle(text,'mol2',filename,null); return; }
  if(ext==='sdf'){ renderSingle(text,'sdf',filename,null); return; }
  if(ext==='mol'){ renderSingle(text,'mol',filename,null); return; }
  if(ext==='xyz'){
    processMultiXYZ(text); return;
  }
  // .txt or unknown extension: smart sniff
  processSingleText(text);
}

// ═══════════════════════════════════════════════════════════════
// PDF EXTRACTION
// ═══════════════════════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc=
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function findColSplit(items,pageWidth){
  var n=items.length; if(n<6) return null;
  var midLo=pageWidth*0.22,midHi=pageWidth*0.78;
  var segs=items.map(function(it){return[it.x0,it.x1];}).sort(function(a,b){return a[0]-b[0];});
  var merged=[],cL=segs[0][0],cR=segs[0][1];
  for(var si=1;si<segs.length;si++){
    if(segs[si][0]<=cR+4){cR=Math.max(cR,segs[si][1]);}
    else{merged.push([cL,cR]);cL=segs[si][0];cR=segs[si][1];}
  }
  merged.push([cL,cR]);
  var minGap=pageWidth*0.025,minSide=0.07,best=null,bestGap=0;
  for(var mi=0;mi<merged.length-1;mi++){
    var gL=merged[mi][1],gR=merged[mi+1][0],gap=gR-gL;
    if(gap<minGap) continue;
    var mid=(gL+gR)/2;
    if(mid<midLo||mid>midHi) continue;
    var lN=items.filter(function(it){return it.x1<=mid;}).length;
    var rN=items.filter(function(it){return it.x0>=mid;}).length;
    if(lN/n>=minSide&&rN/n>=minSide&&gap>bestGap){bestGap=gap;best=mid;}
  }
  if(best!==null) return best;
  // histogram valley
  var bins=40,bw=pageWidth/bins,hist=new Array(bins).fill(0);
  items.forEach(function(it){var cx=(it.x0+it.x1)/2;hist[Math.min(Math.floor(cx/bw),bins-1)]++;});
  var peak=Math.max.apply(null,hist)||1;
  var loBin=Math.floor(bins*0.28),hiBin=Math.floor(bins*0.72),valleys=[];
  for(var bi=loBin;bi<hiBin;bi++){ if(hist[bi]<=peak*0.18) valleys.push(bi); }
  if(valleys.length){
    var centre=bins/2;
    valleys.sort(function(a,b){return Math.abs(a-centre)-Math.abs(b-centre);});
    var sx=(valleys[0]+0.5)*bw;
    var ln=items.filter(function(it){return it.x1<=sx;}).length;
    var rn=items.filter(function(it){return it.x0>=sx;}).length;
    if(ln/n>=minSide&&rn/n>=minSide) return sx;
  }
  return null;
}

function clusterToLines(items){
  if(!items.length) return [];
  items=items.filter(function(it){return (it.str||'').trim();});
  items.sort(function(a,b){return b.y-a.y;});
  var Y=9,groups=[];
  items.forEach(function(it){
    if(!groups.length||Math.abs(groups[groups.length-1].refY-it.y)>Y) groups.push({refY:it.y,items:[it]});
    else groups[groups.length-1].items.push(it);
  });
  return groups.map(function(g){
    g.items.sort(function(a,b){return a.x-b.x;});
    var raw=g.items.map(function(i){return i.str;}).join(' ').replace(/\s{2,}/g,' ').trim();
    // fix minus extracted as separate token: "- 4.2" → "-4.2"
    raw=raw.replace(/(^|\s)-\s+(\d)/g,'$1-$2');
    // fix split decimal: "4 .19" → "4.19"
    raw=raw.replace(/(\d)\s+\.(\d)/g,'$1.$2');
    raw=raw.replace(/([+-]?\d+)\s+\.\s*(\d+)/g,'$1.$2');
    return raw;
  }).filter(Boolean);
}

function splitCoordLine(raw){
  var t=norm(raw).trim().split(/\s+/);
  if(t.length===8){ var L=parseCoordLine(t.slice(0,4).join(' ')),R=parseCoordLine(t.slice(4,8).join(' ')); if(L&&R) return[t.slice(0,4).join(' '),t.slice(4,8).join(' ')]; }
  if(t.length===10){ var L=parseCoordLine(t.slice(0,5).join(' ')),R=parseCoordLine(t.slice(5,10).join(' ')); if(L&&R) return[t.slice(0,5).join(' '),t.slice(5,10).join(' ')]; }
  if(t.length===6){ var L=parseCoordLine(t.slice(0,3).join(' ')),R=parseCoordLine(t.slice(3,6).join(' ')); if(L&&R) return[t.slice(0,3).join(' '),t.slice(3,6).join(' ')]; }
  return null;
}
function splitHeaderLine(raw){
  var n=norm(raw),matches=[],re=new RegExp(HEADER_RE.source,'gi'),m;
  while((m=re.exec(n))!==null) matches.push(m);
  if(matches.length<2) return null;
  var firstEnd=matches[0].index+matches[0][0].length;
  var fm=/\s*[+-]?\d+\.\d+\S*/.exec(n.slice(firstEnd));
  if(!fm) return null;
  var splitAt=firstEnd+fm.index+fm[0].length;
  var left=raw.slice(0,splitAt).trim(),right=raw.slice(splitAt).trim();
  if(!left||!right) return null;
  return[left,right];
}
function splitCountLine(raw){
  var t=raw.trim().split(/\s+/);
  if(t.length===2&&/^\d+$/.test(t[0])&&/^\d+$/.test(t[1])) return[t[0],t[1]];
  return null;
}
function splitNamePair(raw){
  var n=norm(raw).trim(); if(HEADER_RE.test(n)) return null;
  var t=n.split(/\s+/); if(t.length!==2) return null;
  function looksLabel(s){return /^[A-Za-z(]/.test(s)&&/\d/.test(s);}
  if(!looksLabel(t[0])||!looksLabel(t[1])) return null;
  var esc=t[0].replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var m2=new RegExp(esc+'(\\s{2,})').exec(raw);
  if(!m2) return null;
  return[raw.slice(0,m2.index+t[0].length).trim(),raw.slice(m2.index+t[0].length+m2[1].length).trim()];
}
function decolumnSplit(lines){
  var doubleCoord=0,totalCoord=0;
  lines.forEach(function(l){var n=norm(l);if(parseCoordLine(n))totalCoord++;if(splitCoordLine(n))doubleCoord++;});
  if(totalCoord===0||doubleCoord/Math.max(totalCoord,1)<0.25) return{pre:lines,left:[],right:[],post:[]};
  var processed=[],firstDoubled=-1,lastDoubled=-1;
  lines.forEach(function(raw,idx){
    var n=norm(raw).trim();
    if(raw.indexOf('<<BREAK')===0||!n){processed.push({left:raw,right:raw,doubled:false});return;}
    var pair;
    pair=splitCoordLine(n); if(pair){processed.push({left:pair[0],right:pair[1],doubled:true});if(firstDoubled===-1)firstDoubled=idx;lastDoubled=idx;return;}
    pair=splitHeaderLine(raw); if(pair){processed.push({left:pair[0],right:pair[1],doubled:true});if(firstDoubled===-1)firstDoubled=idx;lastDoubled=idx;return;}
    pair=splitCountLine(n); if(pair){processed.push({left:pair[0],right:pair[1],doubled:true});if(firstDoubled===-1)firstDoubled=idx;lastDoubled=idx;return;}
    pair=splitNamePair(raw); if(pair){processed.push({left:pair[0],right:pair[1],doubled:true});if(firstDoubled===-1)firstDoubled=idx;lastDoubled=idx;return;}
    processed.push({left:raw,right:raw,doubled:false});
  });
  if(firstDoubled===-1) return{pre:lines,left:[],right:[],post:[]};
  var pre=[],left=[],right=[],post=[];
  processed.forEach(function(p,idx){
    if(idx<firstDoubled) pre.push(p.left);
    else if(idx>lastDoubled) post.push(p.left);
    else{left.push(p.left);right.push(p.right);}
  });
  return{pre:pre,left:left,right:right,post:post};
}
function detectPerPage(pageData){
  var total=0,coordStart=0,firstTwo=true;
  pageData.forEach(function(pg){
    if(pg.type!=='two') return;
    var combined=pg.left.concat(pg.right);
    if(!combined.some(function(l){return parseCoordLine(norm(l));})) return;
    if(firstTwo){firstTwo=false;return;}
    if(total>=10) return;
    total++;
    var stripped=pg.left.filter(function(l){return l.trim();});
    if(stripped.length&&parseCoordLine(norm(stripped[0]))) coordStart++;
  });
  if(!total) return false;
  return(coordStart/total)>0.5;
}

async function processPDF(file){
  try{
    var arrayBuf=await file.arrayBuffer();
    var pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
    var pageData=[];
    for(var p=1;p<=pdf.numPages;p++){
      var page=await pdf.getPage(p);
      var content=await page.getTextContent();
      var pw=page.view[2];
      var allItems=[];
      content.items.forEach(function(item){
        var s=(item.str||'').trim(); if(!s) return;
        var x0=item.transform[4],w=item.width||0;
        allItems.push({str:s,x:x0,x0:x0,x1:x0+Math.max(w,4),y:item.transform[5]});
      });
      var splitX=findColSplit(allItems,pw);
      var pgEntry;
      if(splitX){
        var leftItems=allItems.filter(function(it){return it.x1<=splitX+2;});
        var rightItems=allItems.filter(function(it){return it.x0>=splitX-2;});
        pgEntry={type:'two',n:p,left:clusterToLines(leftItems),right:clusterToLines(rightItems)};
      } else {
        var rawLines=clusterToLines(allItems);
        var dc=decolumnSplit(rawLines);
        if(dc.left.length>0){
          pgEntry={type:'two',n:p,left:dc.pre.concat(dc.left,dc.post),right:dc.right};
        } else {
          pgEntry={type:'one',n:p,lines:rawLines};
        }
      }
      pageData.push(pgEntry);
      setUploadProgress('Extracting '+p+'/'+pdf.numPages+' pages…',Math.round((p/pdf.numPages)*80)+5);
    }
    var usePerPage=detectPerPage(pageData);
    var allLines=[];
    if(usePerPage){
      pageData.forEach(function(pg){
        if(pg.type==='two'){allLines=allLines.concat(pg.left,pg.right);}
        else{allLines=allLines.concat(pg.lines);}
        allLines.push('<<BREAK:'+pg.n+'>>');
      });
    } else {
      var allLeft=[],allRight=[];
      pageData.forEach(function(pg){
        if(pg.type==='two'){allLeft=allLeft.concat(pg.left);allRight=allRight.concat(pg.right);}
        else{allLeft=allLeft.concat(pg.lines);}
        allLeft.push('<<BREAK:'+pg.n+'>>');
        allRight.push('<<BREAK:'+pg.n+'>>');
      });
      allLines=allLeft.concat(allRight);
    }
    setUploadProgress('Repairing fragments…',90);
    await new Promise(function(r){setTimeout(r,0);});
    allLines=repairBrokenCoordLines(allLines);
    allLines=joinSplitEnergies(allLines);
    setUploadProgress('Parsing structures…',95);
    await new Promise(function(r){setTimeout(r,0);});
    finishSIExtraction(allLines,file.name,false);
  }catch(e){
    setStatus('PDF error: '+e.message,'err');
    setUploadProgress('Error',0);
    console.error(e);
  }
}

async function processDOCX(file){
  try{
    setUploadProgress('Parsing DOCX…',10);
    var buf=await file.arrayBuffer();
    var zip=await JSZip.loadAsync(buf);
    var xmlFile=zip.file('word/document.xml')||zip.file('word/document2.xml');
    if(!xmlFile) throw new Error('word/document.xml not found');
    var xmlText=await xmlFile.async('text');
    var parser=new DOMParser();
    var doc=parser.parseFromString(xmlText,'application/xml');
    var W='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
    function paraText(el){
      var tNodes=el.getElementsByTagNameNS(W,'t'),parts=[];
      for(var j=0;j<tNodes.length;j++){if(tNodes[j].textContent)parts.push(tNodes[j].textContent);}
      return parts.join('');
    }
    var lines=[];
    function addText(text){
      var t=(text||'').trim();
      if(t){t.split(/\n/).forEach(function(sub){var s=sub.trim();if(s)lines.push(s);});}
      else{lines.push('');}
    }
    var bodyEls=doc.getElementsByTagNameNS(W,'body');
    if(!bodyEls.length) throw new Error('No body in DOCX');
    var body=bodyEls[0];
    for(var ci=0;ci<body.childNodes.length;ci++){
      var child=body.childNodes[ci];
      var localName=child.localName||child.nodeName.replace(/^.*:/,'');
      if(localName==='p'){addText(paraText(child));}
      else if(localName==='tbl'){
        var trNodes=child.getElementsByTagNameNS(W,'tr');
        for(var ri=0;ri<trNodes.length;ri++){
          var tcNodes=trNodes[ri].getElementsByTagNameNS(W,'tc');
          var rowParts=[];
          for(var tci=0;tci<tcNodes.length;tci++){
            var pNodes=tcNodes[tci].getElementsByTagNameNS(W,'p');
            var cellParts=[];
            for(var pi2=0;pi2<pNodes.length;pi2++){var pt=paraText(pNodes[pi2]).trim();if(pt)cellParts.push(pt);}
            var cellText=cellParts.join(' ');
            if(cellText){addText(cellText);rowParts.push(cellText);}
          }
          if(rowParts.length>1){var joined=rowParts.join('   ');if(lines.indexOf(joined)===-1)lines.push(joined);}
        }
      } else if(localName==='sectPr'){lines.push('<<BREAK:section>>');}
    }
    setUploadProgress('Repairing…',80);
    lines=repairBrokenCoordLines(lines);
    lines=joinSplitEnergies(lines);
    setUploadProgress('Parsing…',95);
    await new Promise(function(r){setTimeout(r,0);});
    finishSIExtraction(lines,file.name,true);
  }catch(e){
    setStatus('DOCX error: '+e.message,'err');
    setUploadProgress('Error',0);
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════════
// SI PARSER — comprehensive
// ═══════════════════════════════════════════════════════════════
var HEADER_RE=/total\s+energy\s*=|gibbs(?:\s+energy)?\s*=|zero[- ]?point\s+(?:energy|correction)|scf\s+done|number\s+of\s+(?:imaginary\s+)?(?:negative\s+)?freq|thermal\s+correction|imaginary\s+frequencies|\bE_?opt\s+[+-]?\d|\bEelec\s+[+-]?\d|\bEtot\s+[+-]?\d|\bE_?rel\s+[+-]?\d|electronic\s+energy|\bimaginary\s+freq\b|\bG\s*=\s*[+-]?\d+\.\d|\bH\s*=\s*[+-]?\d+\.\d|\bE\s*=\s*[+-]?\d+\.\d|\bU\s*=\s*[+-]?\d+\.\d/i;
var ENERGY_RE=/(?:total\s+energy|gibbs(?:\s+energy)?|scf\s+done|electronic\s+energy(?:\s+bs[12]?)?|E_?opt|Eelec|Etot|E_?rel|E_?\w*|G|H|U)\s*[=:]\s*([+-]?\d+\.\d+)/i;
var CHGMULT_RE=/(?:charge\s*[=:]\s*)?([+-]?\d)\s*[,\s]+(?:mult(?:iplicity)?\s*[=:]\s*)?(\d)\b/i;
var CHGMULT_LINE_RE=/charge\s*=\s*[+-]?\d|multiplicity\s*=\s*\d/i;
var NAME_STOP_RE=/total\s+energy|gibbs|zero.?point|scf\s+done|number\s+of|thermal|enthalpy|entropy|imaginary|electronic\s+energy|\bE_?opt\s|\bEelec\s|\bEtot\s|\bE_?rel\s|\bE\s*=\s*[+-]?\d/i;
var NOT_NAME_RE=/^\s*(?:page\s*\d+|[Ss]\d{1,4}\s*$|[Ss]\.\d+\b|supporting\s+inf|table\s+of\s+contents|references?|figure\s+s?\d+\s*$)\s*$/i;
var META_LINE_RE=/(?:number\s+of|imaginary|thermal|zero.?point|scf\s+done|electronic\s+energy|vibrational|entropy|zero\s+point|convergence|optimization|stationary|frequencies|normal\s+mode|rotational|symmetry\s+number)/i;
var SEC_KW_RE=/\b(?:cartesian|coordinates?|optimized|geometr|states?|intermediates?|structures?|molecules?|compounds?|species|supporting|section|table|figure|transition|appendix)\b/i;
var SEC_SPLIT_RE=/(?:[Ss]\.?\d+\s+)?(?:cartesian\s+)?coordinates?\s+of\s+|(?:intermediates?\s+and\s+)?transition\s+states?\s+|optimized\s+(?:cartesian\s+)?(?:coordinates?|structures?)\s+|\bstates?\s+|\bstructures?\s+|\bspecies\s+|\bmolecules?\s+/i;
var BRKSEN='\x00';

function safeName(name){
  if(!name) return 'Structure';
  name=name.replace(/[\x00-\x1f\x7f]/g,'');
  name=name.replace(/-\s+/g,'-').replace(/\s+-/g,'-');
  name=name.replace(/[<>:"/\\|?*]+/g,'_');
  name=name.replace(/\s+/g,'_').replace(/^[_.]+|[_.]+$/g,'');
  return name.substring(0,80)||'Structure';
}

function extractName(headerLine, contextLines){
  if(headerLine){
    var h=norm(headerLine),m=NAME_STOP_RE.exec(h);
    if(m){
      var before=h.substring(0,m.index).trim().replace(/^[\s:.,;-]+|[\s:.,;-]+$/g,'');
      if(before&&/[A-Za-z0-9]/.test(before)&&!/^[\d\s.+\-]+$/.test(before)){
        if(!SEC_KW_RE.test(before)&&before.split(/\s+/).length<=6) return before;
        var parts=before.split(SEC_SPLIT_RE);
        if(parts.length>1){var tail=parts[parts.length-1].trim().replace(/^[\s:.,;-]+|[\s:.,;-]+$/g,'');if(tail&&tail.split(/\s+/).length<=4&&/[A-Za-z0-9]/.test(tail))return tail;}
        var words=before.split(/\s+/);var last=words[words.length-1].replace(/^[\s:.,;-]+|[\s:.,;-]+$/g,'');
        if(last&&/^[A-Za-z0-9]/.test(last)&&last.length<=20)return last;
        return before;
      }
    }
  }
  var window=[];
  for(var i=Math.max(0,contextLines.length-30);i<contextLines.length;i++){
    var l=norm(contextLines[i]).trim();
    if(!l) continue;
    if(l.indexOf('<<')===0){window.push(BRKSEN);continue;}
    var printable=l.replace(/[^\x20-\x7e]/g,'');
    if(printable.length<l.length*0.5) continue;
    window.push(l);
  }
  for(var wi=window.length-1;wi>=0;wi--){
    var line=window[wi],fwdIdx=wi;
    if(line===BRKSEN) continue;
    if(HEADER_RE.test(line)) continue;
    if(/\bchemical\s+symbol\b/i.test(line)) continue;
    if(CHGMULT_LINE_RE.test(line)) continue;
    if(NOT_NAME_RE.test(line)) continue;
    if(/^[\d\s.+\-]+$/.test(line)){
      if(/^\d{1,6}\s*$/.test(line)){
        var nxt=fwdIdx+1;
        while(nxt<window.length&&window[nxt]===BRKSEN) nxt++;
        if(nxt<window.length&&/electronic\s+energy|zero.?point|thermal_correction|\bimaginary\s+freq\b/i.test(window[nxt])){
          var gap=window.slice(fwdIdx+1,nxt);
          if(!gap.some(function(g){return g===BRKSEN;})) return line.trim();
        }
      }
      continue;
    }
    if(line.split(/\s+/).length>10) continue;
    if(line.length>100) continue;
    if(META_LINE_RE.test(line)) continue;
    var cand=null;
    var cm=/\bcoordinates?\s+of\s+([A-Za-z0-9(][\w\s()\-+.,]{0,60}?)(?:\s*$|\s*[.,])/.exec(line);
    if(cm) cand=cm[1].trim().replace(/[.,\s]+$/,'');
    if(!cand){cm=/^cartesian\s+coordinates?\s+(.+)$/i.exec(line);if(cm)cand=cm[1].trim().replace(/\.$/,'');}
    if(!cand){cm=/^(?:reactant|product|encounter|ion[\s-]?pair)(?:\s+complex)?\s+(\S.{0,40})$/i.exec(line);if(cm)cand=cm[1].trim().replace(/\.$/,'');}
    if(!cand){cm=/^(?:compound|structure|molecule|intermediate|transition[\s-]+state|substrate|catalyst|adduct)\s+(.+)$/i.exec(line);if(cm)cand=cm[1].trim().replace(/\.$/,'');}
    if(!cand&&/[A-Za-z]/.test(line)&&line.split(/\s+/).length<=8) cand=line;
    if(cand){
      if(fwdIdx>0&&cand.split(/\s+/).length>=2){
        var prev=window[fwdIdx-1];
        if(prev!==BRKSEN){
          if(/^\d+\s*$/.test(prev)||(prev.split(/\s+/).length<=2&&/^[A-Za-z0-9]/.test(prev)&&!HEADER_RE.test(prev)&&!CHGMULT_LINE_RE.test(prev)&&!NOT_NAME_RE.test(prev))){
            cand=prev.trim()+' '+cand;
          }
        }
      }
      return cand;
    }
  }
  return null;
}

function isNameSeparator(stripped,nstr){
  if(!stripped) return false;
  if(!/^[A-Za-z(]/.test(stripped)) return false;
  if(HEADER_RE.test(nstr)) return false;
  if(CHGMULT_LINE_RE.test(nstr)) return false;
  if(META_LINE_RE.test(nstr)) return false;
  if(NOT_NAME_RE.test(stripped)) return false;
  if(stripped.length>150||stripped.split(/\s+/).length>12) return false;
  if(/^[A-Za-z]{1,2}\s+[+-]?\d+\.\d+/.test(stripped)) return false;
  if(/^[+-]?\d+\.\d+/.test(stripped)) return false;
  if(/^[A-Za-z]{1,2}(\s+\d+){2,}$/.test(stripped)) return false;
  return true;
}

function parseSI(textLines, defaultCharge, defaultMult, minAtoms, isDocx){
  var structs=[],ctx=[],atoms=[],blkCtx=[],blkPreLen=0,hdrLine=null,inBlock=false,counter=0;
  function flush(){
    if(atoms.length<minAtoms){inBlock=false;atoms=[];blkCtx=[];blkPreLen=0;hdrLine=null;return;}
    counter++;
    var name=extractName(hdrLine,blkCtx.slice(0,blkPreLen));
    if(!name) name='Structure_'+counter;
    var energy=null;
    for(var li=blkCtx.length-1;li>=Math.max(0,blkCtx.length-20);li--){var em=ENERGY_RE.exec(norm(blkCtx[li]));if(em){energy=em[1];break;}}
    var charge=defaultCharge,mult=defaultMult;
    for(var li=blkCtx.length-1;li>=Math.max(0,blkCtx.length-15);li--){var cm=CHGMULT_RE.exec(norm(blkCtx[li]));if(cm){try{charge=parseInt(cm[1],10);mult=parseInt(cm[2],10);}catch(e){}break;}}
    structs.push({name:safeName(name),atoms:atoms.slice(),charge:charge,mult:mult,energy:energy});
    inBlock=false;atoms=[];blkCtx=[];blkPreLen=0;hdrLine=null;
  }
  for(var i=0;i<textLines.length;i++){
    var raw=textLines[i],n=norm(raw),stripped=n.trim();
    if(typeof raw==='string'&&raw.indexOf('<<BREAK')===0){ctx.push(raw);continue;}
    if(!stripped){
      ctx.push(raw);
      if(isDocx&&inBlock&&atoms.length>=minAtoms) flush();
      continue;
    }
    if(HEADER_RE.test(n)){
      if(inBlock) flush();
      ctx.push(raw);hdrLine=raw;continue;
    }
    var coord=parseCoordLine(n);
    if(coord){
      if(!inBlock){inBlock=true;blkCtx=ctx.slice();blkPreLen=blkCtx.length;atoms=[];}
      atoms.push(coord);
    } else {
      if(inBlock&&atoms.length>=minAtoms&&isNameSeparator(stripped,n)){
        var lookahead=false;
        for(var j=i+1;j<Math.min(i+6,textLines.length);j++){
          var nxt=norm(textLines[j]).trim();
          if(!nxt||nxt.indexOf('<<')===0) continue;
          if(parseCoordLine(nxt)) lookahead=true;
          break;
        }
        if(lookahead){flush();ctx.push(raw);hdrLine=raw;continue;}
      }
      ctx.push(raw);
      if(inBlock) blkCtx.push(raw);
    }
  }
  if(inBlock&&atoms.length>=minAtoms) flush();
  var seen={};
  structs.forEach(function(mol){var b=mol.name;seen[b]=(seen[b]||0)+1;if(seen[b]>1)mol.name=b+'_'+seen[b];});
  var seen2={};
  structs.forEach(function(mol){var b=mol.name;if(seen2[b]){seen2[b]++;mol.name=b+'_'+seen2[b];}else seen2[b]=1;});
  return structs;
}

function repairBrokenCoordLines(lines){
  var out=[];
  var ELEM_ONLY=/^[A-Za-z]{1,2}\s*$/;
  var ATNUM_ONLY=/^\d{1,2}\s*$/;
  var ELEM_1F=/^[A-Za-z]{1,2}\s+[+-]?\d+\.\d+\s*$/;
  var ELEM_2F=/^[A-Za-z]{1,2}\s+[+-]?\d+\.\d+\s+[+-]?\d+\.\d+\s*$/;
  var ATNUM_1F=/^\d{1,2}\s+[+-]?\d+\.\d+\s*$/;
  var BARE_FLOATS_2=/^[+-]?\d+\.?\d*\s+[+-]?\d+\.?\d*\s*$/;
  var BARE_FLOATS_3=/^[+-]?\d+\.?\d*(\s+[+-]?\d+\.?\d*){2}\s*$/;
  var BARE_FLOAT_1=/^[+-]?\d+\.\d+\s*$/;
  var IDX_ATNUM=/^\d+\s+\d{1,2}\s*$/;
  function peekNext(start){
    var j=start;
    while(j<lines.length){var s=norm(lines[j]).trim();if(s&&s.indexOf('<<BREAK')!==0)return{idx:j,str:s};j++;}
    return null;
  }
  var i=0;
  while(i<lines.length){
    var line=lines[i],n=norm(line).trim();
    if(!n||n.indexOf('<<BREAK')===0){out.push(line);i++;continue;}
    if(parseCoordLine(n)){out.push(line);i++;continue;}
    var merged=null;
    if(ELEM_ONLY.test(n)||ATNUM_ONLY.test(n)){
      var acc=n,floatCount=0,j=i+1;
      while(floatCount<3&&j<lines.length){
        var pk=peekNext(j);if(!pk)break;var pn=pk.str;
        if(/^([+-]?\d+\.\d+(\s+|$)){1,3}/.test(pn)){
          var tokens=pn.split(/\s+/).filter(Boolean),take=Math.min(tokens.length,3-floatCount),taken=tokens.slice(0,take);
          if(taken.every(function(t){return /^[+-]?\d+\.\d+$/.test(t);})){acc+=' '+taken.join(' ');floatCount+=take;j=pk.idx+1;continue;}
        }
        break;
      }
      if(floatCount===3&&parseCoordLine(acc)) merged={line:acc,nextI:j};
    }
    if(!merged&&(ELEM_1F.test(n)||ATNUM_1F.test(n))){
      var pk=peekNext(i+1);
      if(pk&&BARE_FLOATS_2.test(pk.str)){var c2=n+' '+pk.str.trim();if(parseCoordLine(c2))merged={line:c2.trim(),nextI:pk.idx+1};}
      if(!merged&&pk&&BARE_FLOAT_1.test(pk.str)){var c2=n+' '+pk.str.trim();if(parseCoordLine(c2))merged={line:c2.trim(),nextI:pk.idx+1};}
    }
    if(!merged&&ELEM_2F.test(n)){
      var pk=peekNext(i+1);
      if(pk&&BARE_FLOAT_1.test(pk.str)){var c2=n+' '+pk.str.trim();if(parseCoordLine(c2))merged={line:c2.trim(),nextI:pk.idx+1};}
    }
    if(!merged&&IDX_ATNUM.test(n)){
      var pk=peekNext(i+1);
      if(pk&&BARE_FLOATS_3.test(pk.str)){var c2=n+' '+pk.str.trim();if(parseCoordLine(c2))merged={line:c2.trim(),nextI:pk.idx+1};}
    }
    if(merged){out.push(merged.line);i=merged.nextI;}
    else{out.push(line);i++;}
  }
  return out;
}

function joinSplitEnergies(lines){
  var tKW=/(?:eopt|e_opt|eelec|etot|erel|total\s+energy\s*=|electronic\s+energy\s+bs[12]?\s*=|=)\s*[+-]?\s*$/i;
  var bareNum=/^[+-]?\d+\.\d+\s*$/;
  var out=[],i=0;
  while(i<lines.length){
    var line=lines[i];
    if(tKW.test(norm(line).trim())){
      var j=i+1;
      while(j<lines.length&&lines[j].indexOf('<<BREAK')===0) j++;
      if(j<lines.length&&bareNum.test(norm(lines[j]).trim())){
        out.push(line.trimEnd()+lines[j].trim());
        for(var k=i+1;k<j;k++) out.push(lines[k]);
        i=j+1;continue;
      }
    }
    out.push(line);i++;
  }
  return out;
}

function finishSIExtraction(lines,filename,isDocx){
  var mols=parseSI(lines,0,1,3,isDocx);
  setUploadProgress('Done',100);
  if(!mols.length){
    // If no SI structures, try plain XYZ interpretation
    var combined=lines.join('\n');
    var fmt=sniffFormat(combined);
    if(fmt&&fmt!=='si-text'&&fmt!=='unknown'){
      dispatchTextFile(combined,filename.split('.').pop().toLowerCase(),filename);
      return;
    }
    setStatus('No coordinate blocks found in '+filename,'err');
    return;
  }
  multiMols=mols.map(function(m){return{name:m.name,xyzString:molToXYZ(m),energy:m.energy,natoms:m.atoms.length};});
  mode='multi'; lazyOffsets=[]; curIdx=0;
  showMulti(0);
  setStatus('✓ '+mols.length+' structures extracted from '+filename,'ok');
}
